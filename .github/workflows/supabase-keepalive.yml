name: Supabase keepalive
on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Tiny authenticated DB read (prevents free-project pausing)
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "$SUPABASE_URL/rest/v1/households?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "keepalive status=$code"
          test "$code" = "200"
